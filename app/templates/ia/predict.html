<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>IA Predicción</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    
    <body class="bg-light">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card p-4">

                        <h4>Optimizador de Precios Inteligente IA</h4>

                        <form method="POST">
                            <div class="mb-3">
                                <label>Duración de la sesión (Horas)</label>
                                <input type="number" name="duracion" class="form-control" min="1" max="6" required>
                            </div>
                            
                            <div class="mb-3">
                                <label>Valoración Esperada (1 a 5 estrellas)</label>
                                <input type="number" step="0.1" name="valoracion" class="form-control" min="1" max="5" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">Calcular Precio</button>
                        </form>{% if resultado %}
                        
                        <div class="alert alert-success mt-4 text-center">
                            <h5>Precio Recomendado:</h5>
                            <h3>${{ resultado }} ARS</h3>
                        </div>{% endif %}
                        
                        <div class="text-center mt-3">
                            <a href="{{ url_for('main.index') }}">Volver al Inicio</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
        
    </body>
</html>
