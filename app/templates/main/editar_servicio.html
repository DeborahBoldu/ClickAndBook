<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Servicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h4>Editar Servicio Fotográfico (Update)</h4>
                    <form method="POST">
                        <div class="mb-3">
                            <label>Título</label>
                            <input type="text" name="titulo" class="form-control" value="{{ servicio.titulo }}" required>
                        </div>
                        <div class="mb-3">
                            <label>Descripción</label>
                            <textarea name="descripcion" class="form-control" required>{{ servicio.descripcion }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label>Precio</label>
                            <input type="number" step="0.01" name="precio" class="form-control" value="{{ servicio.precio }}" required>
                        </div>
                        <div class="mb-3">
                            <label>Duración (Hs)</label>
                            <input type="number" name="duracion" class="form-control" value="{{ servicio.duracion }}" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Guardar Cambios</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('main.index') }}">Cancelar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
