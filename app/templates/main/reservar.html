<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>{% if reserva %}Modificar Reserva{% else %}Reservar Servicio{% endif %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card p-4 shadow-sm">

<h3 class="text-center mb-4">
{% if reserva %}
Modificar Reserva
{% else %}
Confirmar Reserva
{% endif %}
</h3>

<h5>Servicio seleccionado:</h5>

<div class="alert alert-info">
<strong>{{ servicio.titulo }}</strong><br>
<p class="mb-1">{{ servicio.descripcion }}</p>
<small>Duración estimada: {{ servicio.duracion }} horas</small>
</div>

<h4 class="text-end text-primary mb-4">
Total: ${{ servicio.precio }}
</h4>

<form method="POST">

<div class="mb-3">
<label class="form-label">Seleccione la Fecha</label>
<input type="date"
id="input_fecha"
name="fecha"
class="form-control"
min="{{ min_date }}"
value="{{ reserva.fecha_reserva if reserva else '' }}"
required>
</div>

<div class="mb-3">
<label class="form-label">Seleccione el Horario</label>
<input type="time"
name="hora"
class="form-control"
value="{{ reserva.hora_reserva if reserva else '' }}"
required>
</div>

<div class="d-flex gap-2">
<a href="{{ url_for('main.mis_reservas') }}" class="btn btn-secondary w-50">Volver</a>

<button type="submit" class="btn btn-success w-50">
{% if reserva %}
Guardar Cambios
{% else %}
Confirmar Turno
{% endif %}
</button>

</div>

</form>

</div>
</div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){
const hoy=new Date();
const offset=hoy.getTimezoneOffset();
const hoyLocal=new Date(hoy.getTime()-(offset*60*1000)).toISOString().split('T')[0];
document.getElementById("input_fecha").min=hoyLocal;
});
</script>

</body>
</html>
